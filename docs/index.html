<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck — do the damn tasks.</title>
  <meta name="description" content="A task app for people who've failed every task app. Built by @DoTheDamnTasks. Follow along or get early alpha access." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0D1017;
      color: #E8F0F6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }

    .cards {
      position: relative;
      width: 72px;
      height: 80px;
      margin-bottom: 6px;
    }

    .card {
      position: absolute;
      width: 56px;
      height: 72px;
      border-radius: 7px;
      background: #151C24;
    }

    .card-b { border: 1.5px solid #1e2d3d; top: 5px; left: 9px; transform: rotate(5deg); }
    .card-c { border: 1.5px solid #1e2d3d; top: 3px; left: 5px; transform: rotate(2.5deg); }

    .card-front {
      border: 2px solid #6CC2A8;
      top: 0; left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-d {
      font-size: 30px;
      font-weight: 800;
      color: #E8F0F6;
      line-height: 1;
    }

    .card-pip {
      position: absolute;
      font-size: 10px;
      font-weight: 700;
      color: #6CC2A8;
      line-height: 1;
    }
    .card-pip.tl { top: 6px; left: 7px; }
    .card-pip.br { bottom: 6px; right: 7px; transform: rotate(180deg); }

    .brand-name {
      font-size: 24px;
      font-weight: 800;
      color: #E8F0F6;
      letter-spacing: -0.5px;
    }

    .brand-name span { color: #6CC2A8; }

    .brand-by {
      font-size: 11px;
      color: #6CC2A8;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .headline {
      font-size: 18px;
      font-weight: 700;
      color: #E8F0F6;
      text-align: center;
      max-width: 480px;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .subline {
      font-size: 13px;
      color: #6A7F96;
      text-align: center;
      max-width: 400px;
      line-height: 1.8;
      margin-bottom: 44px;
    }

    .form-card {
      width: 100%;
      max-width: 460px;
      background: #151C24;
      border: 1px solid #1e2d3d;
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
    }

    .jotform-wrap iframe {
      width: 100% !important;
      border: none !important;
      min-height: 320px;
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: #2e3e50;
      text-align: center;
      line-height: 2;
    }

    .footer a {
      color: #6CC2A8;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .headline { font-size: 16px; }
      body { padding: 36px 16px; }
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <div class="cards">
      <div class="card card-b"></div>
      <div class="card card-c"></div>
      <div class="card card-front">
        <span class="card-pip tl">A</span>
        <span class="card-d">D</span>
        <span class="card-pip br">A</span>
      </div>
    </div>
    <div class="brand-name">deck<span>.</span></div>
    <div class="brand-by">by DTDT</div>
  </div>

  <div class="headline">the task app for people who've failed every task app</div>
  <div class="subline">
    building in public. shipping soon.<br>
    drop your email to follow along — or get first access when alpha opens.
  </div>

  <div class="form-card">
<div class="jotform-wrap" style="padding: 24px;">
  <script src="https://cdn.jotfor.ms/s/umd/latest/for-form-embed-handler.js"></script>
  <script>
    window.jotformEmbedHandler(
      "ifr-261677351510051",
      "https://form.jotform.com/"
    );
  </script>
  <iframe
    id="ifr-261677351510051"
    title="Deck Early Access Signup"
    src="https://form.jotform.com/261677351510051"
    frameborder="0"
    style="width:100%; min-height:380px; border:none;"
    scrolling="no"
  ></iframe>
</div>
  </div>

  <div class="footer">
    <a href="https://www.tiktok.com/@dothedamntasks" target="_blank" rel="noopener">@DoTheDamnTasks</a>
    &nbsp;·&nbsp; no spam, ever.
    <br>
    do the damn tasks.
  </div>

  <script>
    // Auto-resize iframe to fit Jotform content
    window.addEventListener('message', function(e) {
      if (typeof e.data === 'object' && e.data.action === 'setHeight') {
        var iframe = document.getElementById('JotFormIFrame-261677351510051');
        if (iframe) iframe.style.height = e.data.height + 'px';
      }
    });
  </script>

</body>
</html>
